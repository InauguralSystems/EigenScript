name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Build
        run: make EIGENSCRIPT_VERSION=codeql

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:c-cpp"
